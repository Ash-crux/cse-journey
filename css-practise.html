<!DOCTYPE html>
<html>
  <head>
    <title>CSS Practice</title>
    <style>
      h1 {
        color: #333;
        font-size: 36px;
        text-align: center;
      }

      p {
        color: #666;
        font-size: 16px;
        line-height: 1.6;
        text-align: center;
      }

      #special {
        color: purple;
        font-weight: bold;
        font-size: 20px;
      }

      .primary-btn {
        background-color: #4CAF50;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      .danger-btn {
        background-color: #e74c3c;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      .box {
        width: 200px;
        height: 100px;
        background-color: #3498db;
        color: white;
        padding: 20px;
        border: 3px solid #1a5276;
        margin: 30px auto;
      }
    </style>
  </head>
  <body>
    <h1>CSS Practice</h1>
    <p>This is a simple CSS page</p>
    <p id="special">I am special</p>
    <button>Click Me</button>
    <button class="primary-btn">Add Task</button>
    <button class="danger-btn">Delete Task</button>
    <div class="box">I am a box</div>
  </body>
</html>
